<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>neomusic</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6d5dfc">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    
    <style>
        /* LIGHT MODE (Default) */
        :root {
            --bg-color: #e0e5ec;
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
            --accent: #6d5dfc;
            --text-main: #4a5568;
            --text-sub: #718096;
        }

        /* DARK MODE (Automatic) */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #1a1c1e;
                --shadow-light: #25282b;
                --shadow-dark: #0f1011;
                --accent: #8b80ff;
                --text-main: #e1e2e5;
                --text-sub: #aab0b8;
            }
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg-color); 
            height: 100vh; width: 100vw; 
            display: flex; 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            overflow: hidden; 
            color: var(--text-main); 
            transition: background-color 0.3s ease;
            user-select: none;
        }

        .app-wrapper { 
            display: flex; 
            flex-direction: column; 
            width: 100%; height: 100%; 
            padding: 20px; gap: 15px; 
        }

        .player-section { 
            flex: 1.5; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 0; 
            width: 100%; 
        }

        .art-container { 
            width: 100%; 
            display: flex; 
            justify-content: center; 
            margin-bottom: 10px; 
        }
        
        .visual-box {
            width: min(55vw, 35vh, 280px); 
            aspect-ratio: 1/1; 
            background: var(--bg-color);
            box-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            border: 8px solid var(--bg-color);
            position: relative; 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            overflow: hidden;
        }

        .visual-box.disk { border-radius: 50%; }
        
        .visual-box.lyrics-mode { 
            border-radius: 25px; 
            width: min(85vw, 45vh, 360px); 
            height: min(85vw, 45vh, 360px);
        }

        .music-icon { font-size: 4rem; display: none; }
        .visual-box.disk .music-icon { display: block; }
        .visual-box.playing.disk .music-icon { animation: rotateIcon 8s linear infinite; }
        @keyframes rotateIcon { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #lyrics-display { 
            position: absolute; 
            width: 100%; height: 100%; 
            display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start; 
            text-align: center; font-size: 1rem; 
            overflow-y: auto; padding: 25px 20px; 
            z-index: 2; line-height: 1.7; 
            scrollbar-width: none; white-space: pre-wrap;
        }

        .song-info { width: 100%; text-align: center; margin-bottom: 5px; }
        .song-info h1 { 
            font-size: 1.3rem; max-width: 85%; margin: 0 auto;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }
        .song-info p { font-size: 0.9rem; color: var(--text-sub); margin-top: 2px; min-height: 1.2em; }

        .progress-wrapper { width: 100%; display: flex; justify-content: center; margin: 15px 0; }
        .progress-container { 
            width: 85%; max-width: 400px; height: 20px; 
            background: var(--bg-color); border-radius: 10px; 
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); 
            cursor: pointer; position: relative; display: flex; align-items: center; padding: 0 5px; 
        }
        .progress-fill { height: 8px; width: 0%; background: var(--accent); border-radius: 10px; pointer-events: none; transition: width 0.1s linear; }
        .progress-container.dragging .progress-fill { transition: none; }

        .controls-bar { display: flex; gap: 12px; align-items: center; justify-content: center; width: 100%; }
        .btn {
            width: 48px; height: 48px; border-radius: 50%; border: none; background: var(--bg-color);
            box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
            cursor: pointer; display: flex; justify-content: center; align-items: center; 
            font-size: 1rem; color: var(--text-main); transition: 0.2s;
        }
        .btn:active { box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light); }
        .btn.active { color: var(--accent); box-shadow: inset 2px 2px 5px var(--shadow-dark), inset -2px -2px 5px var(--shadow-light); }
        .btn-play { width: 60px; height: 60px; font-size: 1.4rem; color: var(--accent); }

        .playlist-wrapper { flex: 1; display: flex; flex-direction: column; gap: 10px; min-height: 0; }
        .search-bar {
            width: 100%; padding: 12px 20px; border: none; border-radius: 15px; background: var(--bg-color);
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
            color: var(--text-main); font-family: inherit; font-size: 0.95rem; outline: none;
        }

        .playlist-section { 
            flex: 1; background: var(--bg-color); border-radius: 20px; 
            box-shadow: inset 8px 8px 16px var(--shadow-dark), inset -8px -8px 16px var(--shadow-light); 
            padding: 15px; overflow-y: auto; scrollbar-width: none;
        }

        .track-item { 
            padding: 12px; margin-bottom: 10px; border-radius: 12px; 
            box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light); 
            cursor: pointer; font-size: 0.9rem;
        }
        .track-item.active { 
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); 
            color: var(--accent); font-weight: bold; 
        }

        @media (orientation: landscape) or (min-width: 900px) { .app-wrapper { flex-direction: row; } }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <section class="player-section">
            <div class="art-container">
                <div class="visual-box disk" id="visual-box">
                    <span class="music-icon">🎵</span>
                    <div id="lyrics-display"></div>
                </div>
            </div>
            <div class="song-info">
                <h1 id="title">neomusic</h1>
                <p id="artist-display"></p>
            </div>
            <div class="progress-wrapper">
                <div class="progress-container" id="progress-container">
                    <div class="progress-fill" id="progress"></div>
                </div>
            </div>
            <div class="controls-bar">
                <button class="btn" id="shuffle-btn" onclick="toggleShuffle()">🔀</button>
                <button class="btn" onclick="prevSong()">⏮</button>
                <button class="btn btn-play" id="play" onclick="togglePlay()">⏵</button>
                <button class="btn" onclick="nextSong()">⏭</button>
                <button class="btn" id="repeat-btn" onclick="toggleRepeat()">🔁</button>
            </div>
        </section>

        <section class="playlist-wrapper">
            <input type="text" id="search-input" class="search-bar" placeholder="Search songs..." oninput="filterPlaylist()">
            <div class="playlist-section" id="playlist"></div>
        </section>
    </div>

    <audio id="audio"></audio>

    <script>
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('play');
        const shuffleBtn = document.getElementById('shuffle-btn');
        const repeatBtn = document.getElementById('repeat-btn');
        const progress = document.getElementById('progress');
        const progressContainer = document.getElementById('progress-container');
        const titleLabel = document.getElementById('title');
        const artistLabel = document.getElementById('artist-display');
        const lyricsBox = document.getElementById('lyrics-display');
        const visualBox = document.getElementById('visual-box');
        const playlistContainer = document.getElementById('playlist');
        const searchInput = document.getElementById('search-input');

        let songs = [];
        let songIndex = 0;
        let isShuffle = false;
        let repeatState = 0; 
        let isDragging = false;

        async function scanMusicFolder() {
            try {
                const response = await fetch('music/');
                const text = await response.text();
                const doc = new DOMParser().parseFromString(text, 'text/html');
                songs = Array.from(doc.querySelectorAll('a'))
                    .map(link => link.getAttribute('href'))
                    .filter(href => href.toLowerCase().endsWith('.mp3'))
                    .map(file => ({ name: decodeURIComponent(file).replace(/\.mp3$/i, ''), file: file }));
                
                if (songs.length > 0) loadSong(0);
                updatePlaylistUI();
            } catch (err) { titleLabel.innerText = "Folder Empty"; }
        }

        function loadSong(index) {
            songIndex = index;
            const song = songs[songIndex];
            titleLabel.innerText = song.name;
            artistLabel.innerText = ""; 
            audio.src = `music/${song.file}`;
            
            lyricsBox.innerText = "";
            lyricsBox.scrollTop = 0; 
            visualBox.classList.remove('lyrics-mode');
            visualBox.classList.add('disk');

            // Metadata & Media Session update
            window.jsmediatags.read(window.location.origin + "/music/" + song.file, {
                onSuccess: function(tag) {
                    const artist = tag.tags.artist || "Unknown Artist";
                    artistLabel.innerText = artist;
                    
                    updateMediaSession(song.name, artist);

                    const lyrics = tag.tags.lyrics ? (tag.tags.lyrics.lyrics || tag.tags.lyrics) : null;
                    if (lyrics) {
                        lyricsBox.innerText = lyrics;
                        visualBox.classList.remove('disk');
                        visualBox.classList.add('lyrics-mode');
                    }
                },
                onError: function() {
                    updateMediaSession(song.name, "Unknown Artist");
                }
            });
            updatePlaylistUI();
        }

        // --- BACKGROUND PLAY & LOCKSCREEN CONTROLS ---
        function updateMediaSession(title, artist) {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: title,
                    artist: artist,
                    album: 'neomusic',
                    artwork: [{ src: 'icon.png', sizes: '512x512', type: 'image/png' }]
                });

                // Set up handlers for lock screen buttons
                navigator.mediaSession.setActionHandler('play', () => playSong());
                navigator.mediaSession.setActionHandler('pause', () => pauseSong());
                navigator.mediaSession.setActionHandler('previoustrack', () => prevSong());
                navigator.mediaSession.setActionHandler('nexttrack', () => nextSong());
            }
        }

        function togglePlay() { if (audio.paused) playSong(); else pauseSong(); }
        
        function playSong() { 
            audio.play(); 
            playBtn.innerText = '⏸'; 
            visualBox.classList.add('playing');
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "playing";
        }
        
        function pauseSong() { 
            audio.pause(); 
            playBtn.innerText = '⏵'; 
            visualBox.classList.remove('playing');
            if ('mediaSession' in navigator) navigator.mediaSession.playbackState = "paused";
        }

        function toggleShuffle() { isShuffle = !isShuffle; shuffleBtn.classList.toggle('active', isShuffle); }
        function toggleRepeat() {
            repeatState = (repeatState + 1) % 3;
            repeatBtn.classList.toggle('active', repeatState !== 0);
            repeatBtn.innerText = repeatState === 2 ? '🔂' : '🔁';
        }

        function nextSong() {
            if (repeatState === 2) loadSong(songIndex);
            else if (isShuffle) loadSong(Math.floor(Math.random() * songs.length));
            else loadSong((songIndex + 1) % songs.length);
            playSong();
        }

        function prevSong() { loadSong((songIndex - 1 + songs.length) % songs.length); playSong(); }

        function updatePlaylistUI(filteredSongs = null) {
            const listToRender = filteredSongs || songs;
            playlistContainer.innerHTML = '';
            listToRender.forEach((song) => {
                const originalIndex = songs.findIndex(s => s.file === song.file);
                const item = document.createElement('div');
                item.classList.add('track-item');
                if(originalIndex === songIndex) item.classList.add('active');
                item.innerText = song.name;
                item.onclick = () => { loadSong(originalIndex); playSong(); };
                playlistContainer.appendChild(item);
            });
        }

        function filterPlaylist() {
            const term = searchInput.value.toLowerCase();
            const filtered = songs.filter(song => song.name.toLowerCase().includes(term));
            updatePlaylistUI(filtered);
        }

        audio.addEventListener('timeupdate', () => { 
            if (audio.duration && !isDragging) {
                const pct = (audio.currentTime / audio.duration) * 100;
                progress.style.width = `${pct}%`; 
            }
        });

        audio.addEventListener('ended', nextSong);

        // Seek Logic
        function updateProgress(e) {
            const rect = progressContainer.getBoundingClientRect();
            const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const offsetX = clientX - rect.left;
            const totalWidth = rect.width;
            let percentage = offsetX / totalWidth;
            percentage = Math.max(0, Math.min(1, percentage));
            progress.style.width = `${percentage * 100}%`;
            if (isDragging && audio.duration) audio.currentTime = percentage * audio.duration;
        }

        progressContainer.addEventListener('mousedown', (e) => { isDragging = true; progressContainer.classList.add('dragging'); updateProgress(e); });
        window.addEventListener('mousemove', (e) => { if (isDragging) updateProgress(e); });
        window.addEventListener('mouseup', () => { if (isDragging) { isDragging = false; progressContainer.classList.remove('dragging'); } });
        progressContainer.addEventListener('touchstart', (e) => { isDragging = true; progressContainer.classList.add('dragging'); updateProgress(e); });
        window.addEventListener('touchmove', (e) => { if (isDragging) updateProgress(e); }, { passive: false });
        window.addEventListener('touchend', () => { if (isDragging) { isDragging = false; progressContainer.classList.remove('dragging'); } });

        scanMusicFolder();
    </script>
</body>
</html>
